<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact Sheet — Drive Gallery</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  /* ===================== CONFIG =====================
     Paste your OAuth Client ID between the quotes below.
     See the setup guide for how to get one.
     ==================================================== */
</style>
</head>
<body>
<script>
// ============================================================
// CONFIG — paste your Google OAuth Client ID here
// ============================================================
const CONFIG = {
  CLIENT_ID: "YOUR_CLIENT_ID_HERE.apps.googleusercontent.com",
  SCOPES: "https://www.googleapis.com/auth/drive",
};
</script>

<style>
  :root {
    --bg: #121212;
    --panel: #1a1a1a;
    --border: #262626;
    --border-soft: #2a2a2a;
    --text: #EDEAE3;
    --muted: #8A857C;
    --dim: #665f55;
    --amber: #E8A33D;
    --teal: #4FB3BF;
    --purple: #C98BE0;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }
  .display { font-family: 'Fraunces', serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  header {
    border-bottom: 1px solid var(--border-soft);
    padding: 28px 24px 20px;
    position: sticky; top: 0;
    background: rgba(18,18,18,0.92);
    backdrop-filter: blur(6px);
    z-index: 20;
  }
  .sprockets { display: flex; gap: 3px; margin-bottom: 10px; }
  .sprockets div { width: 4px; height: 4px; border-radius: 50%; background: #3a3a3a; }
  .head-row { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 16px; }
  h1 { font-size: 34px; font-weight: 600; margin: 0; letter-spacing: -0.5px; }
  .sub { color: var(--muted); font-size: 12px; margin: 4px 0 0; }

  button { font-family: inherit; cursor: pointer; }
  .btn-primary {
    display: flex; align-items: center; gap: 8px;
    background: var(--amber); color: #121212; border: none;
    border-radius: 8px; padding: 10px 16px; font-weight: 600; font-size: 14px;
  }
  .btn-primary:disabled { background: #2a2a2a; color: #666; cursor: not-allowed; }
  .btn-outline {
    display: flex; align-items: center; gap: 8px;
    background: transparent; color: var(--text); border: 1px solid var(--border-soft);
    border-radius: 8px; padding: 10px 16px; font-weight: 600; font-size: 14px;
  }
  .header-actions { display: flex; gap: 10px; }

  .pill-row { display: flex; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
  .pill {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-soft);
    background: transparent; color: #a39d92; font-size: 13px; font-weight: 500;
  }
  .pill.active { border-color: var(--amber); background: rgba(232,163,61,0.12); color: var(--amber); }
  .pill .count { opacity: 0.7; font-size: 11px; font-family: 'IBM Plex Mono', monospace; margin-left: 2px; }

  .tag-row { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; align-items: center; }
  .tag-chip-group { display: flex; align-items: center; }
  .tag-chip {
    font-size: 12px; padding: 5px 10px; border-radius: 20px 0 0 20px;
    border: 1px solid var(--border-soft); border-right: none;
    background: transparent; color: var(--muted);
  }
  .tag-chip.active { border-color: var(--amber); background: rgba(232,163,61,0.12); color: var(--amber); }
  .tag-del {
    border: 1px solid var(--border-soft); border-left: none; border-radius: 0 20px 20px 0;
    background: transparent; color: var(--dim); padding: 5px 7px; display: flex;
  }
  .tag-del.active { border-color: var(--amber); }
  .tag-all {
    font-size: 12px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border-soft);
    background: transparent; color: var(--muted);
  }
  .tag-all.active { border-color: var(--amber); background: rgba(232,163,61,0.12); color: var(--amber); }
  .tag-new {
    font-size: 12px; padding: 5px 10px; border-radius: 20px; border: 1px dashed var(--border-soft);
    background: transparent; color: var(--dim); display: flex; align-items: center; gap: 4px;
  }
  .tag-new-input {
    font-size: 12px; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--amber);
    background: var(--panel); color: var(--text); outline: none; width: 110px;
  }

  main { padding: 24px; }
  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 14px;
  }
  .card {
    background: var(--panel); border: 1px solid var(--border); border-radius: 10px; overflow: hidden;
  }
  .thumb-wrap {
    cursor: pointer; aspect-ratio: 1/1; background: #0f0f0f; position: relative; overflow: hidden;
  }
  .thumb-wrap img, .thumb-wrap video { width: 100%; height: 100%; object-fit: cover; display: block; }
  .type-badge {
    position: absolute; top: 8px; left: 8px; background: rgba(10,10,10,0.7);
    border-radius: 6px; padding: 3px 6px; display: flex; align-items: center; gap: 4px; font-size: 10px;
  }
  .card-body { padding: 8px 10px; }
  .card-name {
    font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis;
    white-space: nowrap; margin-bottom: 6px;
  }
  .card-tags { display: flex; flex-wrap: wrap; gap: 4px; min-height: 18px; }
  .card-tag { font-size: 10px; color: var(--amber); background: rgba(232,163,61,0.1); border-radius: 10px; padding: 2px 7px; }
  .card-actions { display: flex; gap: 6px; margin-top: 8px; }
  .card-actions button {
    flex: 1; display: flex; align-items: center; justify-content: center; gap: 5px;
    background: transparent; border: 1px solid var(--border-soft); border-radius: 6px;
    color: #a39d92; font-size: 11px; padding: 5px 0;
  }
  .card-actions .del-btn { flex: 0 0 auto; padding: 5px 8px; color: #a35a4a; }
  .tag-editor { margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }
  .tag-opt {
    display: flex; align-items: center; gap: 6px; background: transparent; border: none;
    color: var(--muted); font-size: 11px; padding: 3px 0; text-align: left;
  }
  .tag-opt.checked { color: var(--amber); }
  .checkbox {
    width: 12px; height: 12px; border-radius: 3px; border: 1px solid var(--border-soft);
    display: flex; align-items: center; justify-content: center; font-size: 9px;
  }
  .tag-opt.checked .checkbox { border-color: var(--amber); }
  .tag-editor input {
    font-size: 11px; flex: 1; background: #111; border: 1px solid var(--border-soft);
    border-radius: 5px; color: var(--text); padding: 4px 6px; outline: none; width: 100%;
  }

  .empty { text-align: center; padding: 100px 20px; border: 1px dashed var(--border-soft); border-radius: 12px; }
  .empty p.title { font-size: 22px; margin-bottom: 8px; color: #c9c4ba; }
  .empty p.subtitle { font-size: 12px; color: var(--dim); margin-bottom: 20px; }

  .overlay {
    position: fixed; inset: 0; background: rgba(10,10,10,0.94); z-index: 50;
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .overlay .close-btn { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: var(--text); }
  .overlay img, .overlay video { max-width: 90vw; max-height: 78vh; border-radius: 6px; object-fit: contain; }
  .overlay .caption { margin-top: 10px; font-size: 12px; color: var(--muted); }

  .slideshow { position: fixed; inset: 0; background: #0a0a0a; z-index: 60; display: flex; flex-direction: column; }
  .slide-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid #222; }
  .slide-header span { font-size: 12px; color: var(--muted); }
  .slide-header button { background: transparent; border: none; color: var(--text); }
  .slide-body { flex: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .slide-body img, .slide-body video { max-width: 90vw; max-height: 72vh; border-radius: 6px; object-fit: contain; }
  .slide-controls { display: flex; align-items: center; justify-content: center; gap: 20px; padding: 18px 20px 28px; border-top: 1px solid #222; }
  .icon-btn {
    width: 42px; height: 42px; border-radius: 50%; background: var(--panel); border: 1px solid var(--border-soft);
    color: var(--text); display: flex; align-items: center; justify-content: center;
  }
  .icon-btn.play { background: var(--amber); color: #121212; border: none; }
  .speed-select { display: flex; align-items: center; gap: 8px; margin-left: 20px; }
  .speed-select span { font-size: 12px; color: var(--muted); }
  .speed-select select {
    background: var(--panel); color: var(--text); border: 1px solid var(--border-soft);
    border-radius: 6px; padding: 6px 8px; font-size: 12px; font-family: 'IBM Plex Mono', monospace;
  }

  .center-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; text-align: center; }
  .connect-card { max-width: 380px; }
  .connect-card p { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 20px; }
  .loading { text-align: center; padding: 80px 20px; color: var(--muted); font-size: 13px; }
  svg { display: block; }
</style>
</head>
<body>

<div id="root"></div>

<script>
// ---------------- Icons (inline SVG) ----------------
const ICONS = {
  upload: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>`,
  play: `<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="5 3 19 12 5 21 5 3"/></svg>`,
  pause: `<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" stroke="none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>`,
  x: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`,
  tag: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.59 13.41 13.42 20.58a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82Z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>`,
  trash: `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`,
  plus: `<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
  check: `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  chevLeft: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  chevRight: `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>`,
  grid: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
  image: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>`,
  film: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"/><line x1="7" y1="2" x2="7" y2="22"/><line x1="17" y1="2" x2="17" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>`,
  sparkles: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-1.9 5.8a2 2 0 0 1-1.3 1.3L3 12l5.8 1.9a2 2 0 0 1 1.3 1.3L12 21l1.9-5.8a2 2 0 0 1 1.3-1.3L21 12l-5.8-1.9a2 2 0 0 1-1.3-1.3Z"/></svg>`,
};

// ---------------- State ----------------
const state = {
  accessToken: null,
  files: [],            // { id, name, mimeType, thumbnailLink, properties, kind }
  loading: false,
  filterType: "all",
  filterTag: null,
  localTags: new Set(), // tags created locally before being applied to any file
  lightboxId: null,
  tagEditorId: null,
  slideshow: { open: false, playing: true, index: 0, speed: 3 },
};
const blobCache = new Map(); // fileId -> object URL (full-res, fetched w/ auth)

let tokenClient = null;

function kindOf(mimeType) {
  if (mimeType === "image/gif") return "gif";
  if (mimeType.startsWith("video/")) return "video";
  return "photo";
}
function tagsOf(file) {
  const props = file.properties || {};
  return Object.keys(props).filter(k => k.startsWith("tag_")).map(k => k.slice(4));
}
function allTags() {
  const s = new Set(state.localTags);
  state.files.forEach(f => tagsOf(f).forEach(t => s.add(t)));
  return Array.from(s).sort();
}
function sanitizeTagKey(name) {
  return "tag_" + name.trim().toLowerCase().replace(/[^a-z0-9_-]/g, "-");
}

// ---------------- Google Auth ----------------
function initAuth() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CONFIG.CLIENT_ID,
    scope: CONFIG.SCOPES,
    callback: (resp) => {
      if (resp.error) { alert("Sign-in failed: " + resp.error); return; }
      state.accessToken = resp.access_token;
      render();
      loadFiles();
    },
  });
  render();
}
function connect() {
  tokenClient.requestAccessToken({ prompt: "consent" });
}

// ---------------- Drive API ----------------
async function driveFetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      Authorization: "Bearer " + state.accessToken,
    },
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error("Drive API error " + res.status + ": " + body);
  }
  return res;
}

async function loadFiles() {
  state.loading = true; render();
  try {
    let files = [];
    let pageToken = null;
    const q = encodeURIComponent("(mimeType contains 'image/' or mimeType contains 'video/') and trashed = false");
    const fields = encodeURIComponent("nextPageToken, files(id, name, mimeType, thumbnailLink, properties)");
    do {
      const url = `https://www.googleapis.com/drive/v3/files?q=${q}&fields=${fields}&pageSize=1000&spaces=drive` +
        (pageToken ? `&pageToken=${pageToken}` : "");
      const res = await driveFetch(url);
      const data = await res.json();
      files = files.concat(data.files || []);
      pageToken = data.nextPageToken || null;
    } while (pageToken);
    state.files = files;
  } catch (err) {
    console.error(err);
    alert("Couldn't load your Drive files. See console for details.");
  }
  state.loading = false;
  render();
}

async function uploadFiles(fileList) {
  const files = Array.from(fileList).filter(f => f.type.startsWith("image/") || f.type.startsWith("video/"));
  for (const file of files) {
    const metadata = { name: file.name, mimeType: file.type };
    const form = new FormData();
    form.append("metadata", new Blob([JSON.stringify(metadata)], { type: "application/json" }));
    form.append("file", file);
    try {
      const res = await driveFetch(
        "https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart&fields=id,name,mimeType,thumbnailLink,properties",
        { method: "POST", body: form }
      );
      const created = await res.json();
      state.files.unshift(created);
      render();
    } catch (err) {
      console.error(err);
      alert(`Upload failed for ${file.name}`);
    }
  }
}

async function deleteFile(fileId) {
  try {
    await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, { method: "DELETE" });
    state.files = state.files.filter(f => f.id !== fileId);
    if (state.lightboxId === fileId) state.lightboxId = null;
    render();
  } catch (err) {
    console.error(err);
    alert("Couldn't delete that file.");
  }
}

async function setFileTag(fileId, tagName, on) {
  const key = sanitizeTagKey(tagName);
  const body = { properties: { [key]: on ? "1" : null } };
  try {
    const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${fileId}?fields=id,properties`, {
      method: "PATCH",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(body),
    });
    const updated = await res.json();
    const f = state.files.find(x => x.id === fileId);
    if (f) f.properties = updated.properties || {};
    render();
  } catch (err) {
    console.error(err);
    alert("Couldn't update tags on that file.");
  }
}

async function getMediaBlobUrl(file) {
  if (blobCache.has(file.id)) return blobCache.get(file.id);
  const res = await driveFetch(`https://www.googleapis.com/drive/v3/files/${file.id}?alt=media`);
  const blob = await res.blob();
  const url = URL.createObjectURL(blob);
  blobCache.set(file.id, url);
  return url;
}

// ---------------- Derived data ----------------
function filteredFiles() {
  return state.files.filter(f => {
    const kind = kindOf(f.mimeType);
    if (state.filterType !== "all" && kind !== state.filterType) return false;
    if (state.filterTag && !tagsOf(f).includes(state.filterTag)) return false;
    return true;
  });
}
function counts() {
  const c = { all: state.files.length, photo: 0, video: 0, gif: 0 };
  state.files.forEach(f => c[kindOf(f.mimeType)]++);
  return c;
}

// ---------------- Rendering ----------------
const root = document.getElementById("root");

function render() {
  if (!state.accessToken) {
    root.innerHTML = renderConnectScreen();
    document.getElementById("connect-btn")?.addEventListener("click", connect);
    return;
  }
  root.innerHTML = renderApp();
  wireUpApp();
}

function renderConnectScreen() {
  const configured = CONFIG.CLIENT_ID && !CONFIG.CLIENT_ID.startsWith("YOUR_CLIENT_ID");
  return `
    <div class="center-screen">
      <div class="connect-card">
        <div class="sprockets" style="justify-content:center;">${Array(20).fill('<div></div>').join("")}</div>
        <h1 class="display">Contact Sheet</h1>
        <p>${configured
          ? "Connect your Google Drive to browse, tag, and slideshow your photos, gifs, and videos."
          : "⚠️ Set CONFIG.CLIENT_ID at the top of this file's &lt;script&gt; before connecting. See the setup guide."}</p>
        <button id="connect-btn" class="btn-primary" style="margin:0 auto;" ${configured ? "" : "disabled"}>
          ${ICONS.upload} Connect Google Drive
        </button>
      </div>
    </div>
  `;
}

function renderApp() {
  const filtered = filteredFiles();
  const c = counts();
  const tags = allTags();

  return `
    <header>
      <div class="sprockets">${Array(24).fill('<div></div>').join("")}</div>
      <div class="head-row">
        <div>
          <h1 class="display">Contact Sheet</h1>
          <p class="sub">${state.files.length} item${state.files.length !== 1 ? "s" : ""} in your Drive · synced across devices</p>
        </div>
        <div class="header-actions">
          <button id="slideshow-btn" class="btn-primary" ${filtered.length === 0 ? "disabled" : ""}>${ICONS.play} Slideshow</button>
          <button id="import-btn" class="btn-outline">${ICONS.upload} Import</button>
          <input id="file-input" type="file" multiple accept="image/*,video/*" hidden />
        </div>
      </div>

      <div class="pill-row">
        <button class="pill ${state.filterType === "all" ? "active" : ""}" data-filter-type="all">${ICONS.grid} All <span class="count">${c.all}</span></button>
        <button class="pill ${state.filterType === "photo" ? "active" : ""}" data-filter-type="photo">${ICONS.image} Photos <span class="count">${c.photo}</span></button>
        <button class="pill ${state.filterType === "video" ? "active" : ""}" data-filter-type="video">${ICONS.film} Videos <span class="count">${c.video}</span></button>
        <button class="pill ${state.filterType === "gif" ? "active" : ""}" data-filter-type="gif">${ICONS.sparkles} GIFs <span class="count">${c.gif}</span></button>
      </div>

      <div class="tag-row">
        ${ICONS.tag}
        <button class="tag-all ${!state.filterTag ? "active" : ""}" data-tag-filter="">all tags</button>
        ${tags.map(t => `
          <div class="tag-chip-group">
            <button class="tag-chip ${state.filterTag === t ? "active" : ""}" data-tag-filter="${t}">#${t}</button>
            <button class="tag-del ${state.filterTag === t ? "active" : ""}" data-tag-delete="${t}">${ICONS.x}</button>
          </div>
        `).join("")}
        <span id="new-tag-slot"></span>
      </div>
    </header>

    <main>
      ${state.loading ? `<div class="loading">Loading your library…</div>` : (
        filtered.length === 0 ? renderEmpty() : `
          <div class="grid">
            ${filtered.map(f => renderCard(f, tags)).join("")}
          </div>
        `
      )}
    </main>

    ${state.lightboxId ? renderLightbox() : ""}
    ${state.slideshow.open ? renderSlideshow(filtered) : ""}
  `;
}

function renderEmpty() {
  const hasMedia = state.files.length > 0;
  return `
    <div class="empty">
      <p class="title display">${hasMedia ? "Nothing matches this filter" : "Your contact sheet is empty"}</p>
      <p class="subtitle mono">${hasMedia ? "Try a different type or tag" : "Import photos, gifs, or videos to begin"}</p>
      ${!hasMedia ? `<button id="empty-import-btn" class="btn-primary" style="margin:0 auto;">Import media</button>` : ""}
    </div>
  `;
}

function renderCard(f, tags) {
  const kind = kindOf(f.mimeType);
  const badgeIcon = kind === "video" ? ICONS.film : kind === "gif" ? ICONS.sparkles : ICONS.image;
  const badgeColor = kind === "video" ? "var(--teal)" : kind === "gif" ? "var(--purple)" : "var(--amber)";
  const fTags = tagsOf(f);
  const editorOpen = state.tagEditorId === f.id;
  return `
    <div class="card" data-file-id="${f.id}">
      <div class="thumb-wrap" data-open-lightbox="${f.id}">
        ${f.thumbnailLink
          ? `<img src="${f.thumbnailLink}" alt="${escapeHtml(f.name)}" loading="lazy" />`
          : `<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#444;">${badgeIcon}</div>`
        }
        <div class="type-badge" style="color:${badgeColor}">${badgeIcon}</div>
      </div>
      <div class="card-body">
        <div class="card-name mono">${escapeHtml(f.name)}</div>
        <div class="card-tags">${fTags.map(t => `<span class="card-tag mono">#${t}</span>`).join("")}</div>
        <div class="card-actions">
          <button data-toggle-tag-editor="${f.id}">${ICONS.tag} tags</button>
          <button class="del-btn" data-delete-file="${f.id}">${ICONS.trash}</button>
        </div>
        ${editorOpen ? `
          <div class="tag-editor">
            ${tags.map(t => `
              <button class="tag-opt mono ${fTags.includes(t) ? "checked" : ""}" data-toggle-file-tag="${f.id}|${t}">
                <span class="checkbox">${fTags.includes(t) ? ICONS.check : ""}</span> #${t}
              </button>
            `).join("")}
            <form data-new-file-tag="${f.id}">
              <input type="text" placeholder="new tag…" class="mono" />
            </form>
          </div>
        ` : ""}
      </div>
    </div>
  `;
}

function renderLightbox() {
  const f = state.files.find(x => x.id === state.lightboxId);
  if (!f) return "";
  const kind = kindOf(f.mimeType);
  return `
    <div class="overlay" id="lightbox-overlay">
      <button class="close-btn" id="lightbox-close">${ICONS.x}</button>
      <div id="lightbox-media" onclick="event.stopPropagation()">
        <div class="loading">Loading…</div>
      </div>
    </div>
  `;
}

function renderSlideshow(filtered) {
  const f = filtered[state.slideshow.index];
  return `
    <div class="slideshow">
      <div class="slide-header">
        <span class="mono">${state.filterTag ? `#${state.filterTag} · ` : ""}${state.slideshow.index + 1} / ${filtered.length}</span>
        <button id="slideshow-close">${ICONS.x}</button>
      </div>
      <div class="slide-body" id="slideshow-media">
        <div class="loading">Loading…</div>
      </div>
      <div class="slide-controls">
        <button class="icon-btn" id="slide-prev">${ICONS.chevLeft}</button>
        <button class="icon-btn play" id="slide-toggle">${state.slideshow.playing ? ICONS.pause : ICONS.play}</button>
        <button class="icon-btn" id="slide-next">${ICONS.chevRight}</button>
        <div class="speed-select">
          <span class="mono">speed</span>
          <select id="slide-speed">
            ${[1,2,3,5,8,12].map(s => `<option value="${s}" ${state.slideshow.speed === s ? "selected" : ""}>${s}s / slide</option>`).join("")}
          </select>
        </div>
      </div>
    </div>
  `;
}

function escapeHtml(s) {
  const div = document.createElement("div");
  div.textContent = s;
  return div.innerHTML;
}

// ---------------- Event wiring ----------------
let slideTimer = null;

function wireUpApp() {
  document.getElementById("import-btn")?.addEventListener("click", () => document.getElementById("file-input").click());
  document.getElementById("empty-import-btn")?.addEventListener("click", () => document.getElementById("file-input").click());
  document.getElementById("file-input")?.addEventListener("change", (e) => {
    if (e.target.files.length) uploadFiles(e.target.files);
  });

  document.querySelectorAll("[data-filter-type]").forEach(el =>
    el.addEventListener("click", () => { state.filterType = el.dataset.filterType; render(); })
  );
  document.querySelectorAll("[data-tag-filter]").forEach(el =>
    el.addEventListener("click", () => { state.filterTag = el.dataset.tagFilter || null; render(); })
  );
  document.querySelectorAll("[data-tag-delete]").forEach(el =>
    el.addEventListener("click", async (ev) => {
      ev.stopPropagation();
      const tag = el.dataset.tagDelete;
      if (!confirm(`Remove tag "#${tag}" from all files?`)) return;
      const affected = state.files.filter(f => tagsOf(f).includes(tag));
      for (const f of affected) await setFileTag(f.id, tag, false);
      state.localTags.delete(tag);
      if (state.filterTag === tag) state.filterTag = null;
      render();
    })
  );

  renderNewTagSlot();

  document.querySelectorAll("[data-open-lightbox]").forEach(el =>
    el.addEventListener("click", () => { state.lightboxId = el.dataset.openLightbox; render(); loadLightboxMedia(); })
  );
  document.querySelectorAll("[data-toggle-tag-editor]").forEach(el =>
    el.addEventListener("click", () => {
      const id = el.dataset.toggleTagEditor;
      state.tagEditorId = state.tagEditorId === id ? null : id;
      render();
    })
  );
  document.querySelectorAll("[data-toggle-file-tag]").forEach(el =>
    el.addEventListener("click", () => {
      const [fileId, tag] = el.dataset.toggleFileTag.split("|");
      const f = state.files.find(x => x.id === fileId);
      const on = !tagsOf(f).includes(tag);
      setFileTag(fileId, tag, on);
    })
  );
  document.querySelectorAll("[data-new-file-tag]").forEach(el =>
    el.addEventListener("submit", (ev) => {
      ev.preventDefault();
      const input = el.querySelector("input");
      const name = input.value.trim();
      if (!name) return;
      const fileId = el.dataset.newFileTag;
      setFileTag(fileId, name, true);
    })
  );
  document.querySelectorAll("[data-delete-file]").forEach(el =>
    el.addEventListener("click", (ev) => {
      ev.stopPropagation();
      if (confirm("Delete this file from Google Drive? This cannot be undone.")) {
        deleteFile(el.dataset.deleteFile);
      }
    })
  );

  document.getElementById("lightbox-close")?.addEventListener("click", () => { state.lightboxId = null; render(); });
  document.getElementById("lightbox-overlay")?.addEventListener("click", () => { state.lightboxId = null; render(); });

  document.getElementById("slideshow-btn")?.addEventListener("click", () => {
    if (filteredFiles().length === 0) return;
    state.slideshow = { open: true, playing: true, index: 0, speed: state.slideshow.speed };
    render();
    loadSlideMedia();
    startSlideTimer();
  });
  document.getElementById("slideshow-close")?.addEventListener("click", () => {
    stopSlideTimer();
    state.slideshow.open = false;
    render();
  });
  document.getElementById("slide-prev")?.addEventListener("click", () => stepSlide(-1));
  document.getElementById("slide-next")?.addEventListener("click", () => stepSlide(1));
  document.getElementById("slide-toggle")?.addEventListener("click", () => {
    state.slideshow.playing = !state.slideshow.playing;
    render();
    loadSlideMedia();
    if (state.slideshow.playing) startSlideTimer(); else stopSlideTimer();
  });
  document.getElementById("slide-speed")?.addEventListener("change", (e) => {
    state.slideshow.speed = Number(e.target.value);
    if (state.slideshow.playing) startSlideTimer();
  });
}

function renderNewTagSlot() {
  const slot = document.getElementById("new-tag-slot");
  if (!slot) return;
  slot.innerHTML = `<button class="tag-new mono" id="new-tag-open">${ICONS.plus} new tag</button>`;
  document.getElementById("new-tag-open").addEventListener("click", () => {
    slot.innerHTML = `<form id="new-tag-form"><input class="tag-new-input mono" id="new-tag-input" placeholder="tag name" autofocus /></form>`;
    const input = document.getElementById("new-tag-input");
    input.focus();
    document.getElementById("new-tag-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const name = input.value.trim();
      if (name) state.localTags.add(name);
      render();
    });
    input.addEventListener("blur", () => { if (!input.value) render(); });
  });
}

async function loadLightboxMedia() {
  const f = state.files.find(x => x.id === state.lightboxId);
  if (!f) return;
  const container = document.getElementById("lightbox-media");
  if (!container) return;
  try {
    const url = await getMediaBlobUrl(f);
    const kind = kindOf(f.mimeType);
    container.innerHTML = kind === "video"
      ? `<video src="${url}" controls autoplay></video><div class="caption mono">${escapeHtml(f.name)}</div>`
      : `<img src="${url}" alt="${escapeHtml(f.name)}" /><div class="caption mono">${escapeHtml(f.name)}</div>`;
  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="loading">Couldn't load this file.</div>`;
  }
}

async function loadSlideMedia() {
  const filtered = filteredFiles();
  const f = filtered[state.slideshow.index];
  const container = document.getElementById("slideshow-media");
  if (!f || !container) return;
  try {
    const url = await getMediaBlobUrl(f);
    const kind = kindOf(f.mimeType);
    container.innerHTML = kind === "video"
      ? `<video src="${url}" autoplay muted loop></video>`
      : `<img src="${url}" alt="${escapeHtml(f.name)}" />`;
  } catch (err) {
    console.error(err);
    container.innerHTML = `<div class="loading">Couldn't load this file.</div>`;
  }
}

function stepSlide(delta) {
  const filtered = filteredFiles();
  if (filtered.length === 0) return;
  state.slideshow.index = (state.slideshow.index + delta + filtered.length) % filtered.length;
  render();
  loadSlideMedia();
  if (state.slideshow.playing) startSlideTimer();
}

function startSlideTimer() {
  stopSlideTimer();
  slideTimer = setInterval(() => {
    const filtered = filteredFiles();
    if (filtered.length === 0) return;
    state.slideshow.index = (state.slideshow.index + 1) % filtered.length;
    render();
    loadSlideMedia();
  }, state.slideshow.speed * 1000);
}
function stopSlideTimer() {
  if (slideTimer) clearInterval(slideTimer);
  slideTimer = null;
}

// ---------------- Boot ----------------
window.addEventListener("load", () => {
  const check = setInterval(() => {
    if (window.google && google.accounts && google.accounts.oauth2) {
      clearInterval(check);
      initAuth();
    }
  }, 50);
});
</script>
</body>
</html>
